name: phober-db

services:
    db_mysql:
        image: mysql:8.0
        container_name: db_mysql
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
            SERVICE_TAGS: dev
            SERVICE_NAME: mysql
        ports:
            - "${MYSQL_PUBLIC_PORT:-8306}:3306"
        volumes:
            - ./docker/mysql/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
            - db_mysql_data:/var/lib/mysql
        networks:
            - private

    redis:
        image: redis:7-alpine
        container_name: redis
        ports:
            - "${REDIS_PUBLIC_PORT:-8379}:6379"
        volumes:
            - redis_data:/data
        networks:
            - private

    rabbitmq:
        image: rabbitmq:3.13-management-alpine
        container_name: rabbitmq
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-phober}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-secret}
            RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-phober}
        ports:
            - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        networks:
            - private

    minio:
        image: minio/minio
        container_name: minio
        environment:
            MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-defaultaccesskey}
            MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-defaultsecretkey}
        ports:
            - "${MINIO_WEB_UI_PORT:-9100}:9001"
        command: server /data --console-address ":9001"
        volumes:
            - ./buckets:/data
        networks:
            - private

volumes:
    db_mysql_data:
        name: phober_db_mysql_data
    redis_data:
        name: phober_redis_data
    rabbitmq_data:
        name: phober_rabbitmq_data

networks:
    private:
        name: phober_private
        external: true
    public:
        name: phober_public
        external: true
