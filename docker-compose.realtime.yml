name: phober-realtime

# ──────────────────────────────────────────────────────────────────────────────
# Reusable building blocks
# ──────────────────────────────────────────────────────────────────────────────

x-php-image: &php-image abdukhaligov/phober-php-apache:2.1.0

x-php-base: &php-base
    image: *php-image
    restart: unless-stopped
    networks: [private]

x-shared-laravel-volume: &shared-laravel-volume
    ./shared/laravel-common:/var/www/html/shared:ro

x-php-ini: &php-ini ./docker/phober-php/php.ini:/usr/local/etc/php/conf.d/zz-phober.ini:ro
x-php-opcache: &php-opcache ./docker/phober-php/opcache.ini:/usr/local/etc/php/conf.d/zz-opcache.ini:ro

# ──────────────────────────────────────────────────────────────────────────────
# Services
# ──────────────────────────────────────────────────────────────────────────────

services:
    notification-queue:
        <<: *php-base
        container_name: notification-queue
        command: php artisan queue:work
        env_file:
            - docker/env/apache.env
            - docker/env/laravel.env
            - docker/env/redis.env
            - docker/env/mail.env
            - docker/env/db-shared-admin.env
        environment:
            APP_KEY: ${APP_KEY_NOTIFICATION_SERVER}
            DISCORD_TOKEN: ${DISCORD_TOKEN:-}
            DISCORD_SUPPORT_CHANNEL: ${DISCORD_SUPPORT_CHANNEL:-}
            DISCORD_OTP_CHANNEL: ${DISCORD_OTP_CHANNEL:-}
            TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
            TELEGRAM_OTP_CHANNEL: ${TELEGRAM_OTP_CHANNEL:-}
            TELEGRAM_SUPPORT_CHANNEL: ${TELEGRAM_SUPPORT_CHANNEL:-}
            DB_QUEUE: notification
        volumes:
            - *php-ini
            - *php-opcache
            - *shared-laravel-volume
            - ./services/notification-server:/var/www/html

    staff-queue:
        <<: *php-base
        container_name: staff-queue
        command: php artisan queue:work --queue=staff
        env_file:
            - docker/env/apache.env
            - docker/env/laravel.env
            - docker/env/redis.env
            - docker/env/reverb.env
            - docker/env/db-staff-default.env
            - docker/env/db-shared-admin.env
        environment:
            APP_KEY: ${APP_KEY_STAFF_SERVICE}
            DB_QUEUE: staff
        volumes:
            - *php-ini
            - *php-opcache
            - *shared-laravel-volume
            - ./services/staff-service:/var/www/html

    device-queue:
        <<: *php-base
        container_name: device-queue
        command: php artisan queue:work --queue=device
        env_file:
            - docker/env/apache.env
            - docker/env/laravel.env
            - docker/env/redis.env
            - docker/env/mail.env
            - docker/env/reverb.env
            - docker/env/db-device-default.env
            - docker/env/db-shared-admin.env
        environment:
            APP_KEY: ${APP_KEY_DEVICE_SERVICE}
            APP_URL: /hardware
            AWS_URL: /s3/media
            DB_QUEUE: device
        volumes:
            - *php-ini
            - *php-opcache
            - *shared-laravel-volume
            - ./services/device-service:/var/www/html

    staff-schedule:
        <<: *php-base
        container_name: staff-schedule
        command: php artisan schedule:work
        env_file:
            - docker/env/apache.env
            - docker/env/laravel.env
            - docker/env/redis.env
            - docker/env/reverb.env
            - docker/env/db-staff-default.env
            - docker/env/db-shared-admin.env
        environment:
            APP_KEY: ${APP_KEY_STAFF_SERVICE}
            QUEUE_CONNECTION: database
        volumes:
            - *php-ini
            - *php-opcache
            - *shared-laravel-volume
            - ./services/staff-service:/var/www/html

    device-schedule:
        <<: *php-base
        container_name: device-schedule
        command: php artisan schedule:work
        env_file:
            - docker/env/apache.env
            - docker/env/laravel.env
            - docker/env/redis.env
            - docker/env/reverb.env
            - docker/env/db-device-default.env
            - docker/env/db-shared-admin.env
        environment:
            APP_KEY: ${APP_KEY_DEVICE_SERVICE}
            QUEUE_CONNECTION: database
        volumes:
            - *php-ini
            - *php-opcache
            - *shared-laravel-volume
            - ./services/device-service:/var/www/html

    ws:
        <<: *php-base
        container_name: ws
        command: sh -c "php artisan reverb:start --host=0.0.0.0 --port=8080 --debug"
        env_file:
            - docker/env/apache.env
            - docker/env/laravel.env
            - docker/env/redis.env
            - docker/env/db-auth-admin.env
            - docker/env/db-shared-admin.env
        environment:
            APP_KEY: ${APP_KEY_AUTH_SERVER}
            BROADCAST_CONNECTION: reverb
            REVERB_APP_ID: ${REVERB_APP_ID:-phober}
            REVERB_APP_KEY: ${REVERB_APP_KEY:-phober-key}
            REVERB_APP_SECRET: ${REVERB_APP_SECRET:-phober-secret}
            REVERB_HOST: 0.0.0.0
            REVERB_PORT: "8080"
            REVERB_SCHEME: http
        volumes:
            - *php-ini
            - *php-opcache
            - *shared-laravel-volume
            - ./services/auth-server:/var/www/html

networks:
    private:
        external: true
        name: phober_private
