name: phober-frontend

services:
    staff-app:
        image: node:20-alpine
        container_name: staff-app
        working_dir: /app
        command: sh -c "npm install && npm run dev"
        ports:
            - "${STAFF_APP_PORT:-3000}:5173"
        volumes:
            - ./services/staff-app:/app
            - /app/node_modules
        environment:
            VITE_API_URL: ${STAFF_APP_API_URL:-https://localhost:8000}
            VITE_REVERB_KEY: ${REVERB_APP_KEY:-phober-key}
        networks:
            - public

    website:
        image: node:20-alpine
        container_name: website
        working_dir: /app
        command: sh -c "npm install && npm run dev"
        ports:
            - "${WEBSITE_PORT:-3001}:5173"
        volumes:
            - ./services/website:/app
            - /app/node_modules
        environment:
            VITE_API_URL: ${API_URL:-https://localhost:8000}
        networks:
            - public

networks:
    public:
        external: true
        name: phober_public
