name: phober-frontend

services:
    staff-app:
        image: node:20-alpine
        container_name: staff-app
        working_dir: /app
        command: sh -c "npm install && npm run dev -- --host"
        volumes:
            - ./services/staff-app:/app
            - /app/node_modules
        environment:
            VITE_API_URL: ${VITE_API_URL:-http://api.phober.test}
            VITE_REVERB_KEY: ${REVERB_APP_KEY:-phober-key}
        networks:
            - public

    website:
        image: node:20-alpine
        container_name: website
        working_dir: /app
        command: sh -c "npm install && npm run dev -- --host"
        volumes:
            - ./services/website:/app
            - /app/node_modules
        environment:
            VITE_API_URL: ${VITE_API_URL:-http://api.phober.test}
        networks:
            - public

networks:
    public:
        external: true
        name: phober_public
